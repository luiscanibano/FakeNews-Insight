services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ../..
      dockerfile: fakenews-backend/Dockerfile
    image: fakenews-backend:vps
    container_name: fakenews-backend
    environment:
      - PORT=8000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO}
      - STRIPE_PRICE_ULTRA=${STRIPE_PRICE_ULTRA}
      - BILLING_SUCCESS_URL=${BILLING_SUCCESS_URL}
      - BILLING_CANCEL_URL=${BILLING_CANCEL_URL}
      - BILLING_PORTAL_RETURN_URL=${BILLING_PORTAL_RETURN_URL}
      - CORS_ALLOW_ORIGIN_REGEX=${CORS_ALLOW_ORIGIN_REGEX}
      - FEVER_MODEL_PATH=${FEVER_MODEL_PATH:-/models/fever/deberta-v3-small-fever-v1}
      - FEVER_AGENT_MAX_CLAIMS=${FEVER_AGENT_MAX_CLAIMS:-5}
      - FEVER_AGENT_MAX_EVIDENCES=${FEVER_AGENT_MAX_EVIDENCES:-5}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - FEVER_LLM_MODEL=${FEVER_LLM_MODEL:-gpt-4o-mini}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - VERIFY_REDIS_URL=${VERIFY_REDIS_URL:-redis://redis:6379/0}
      - VERIFY_QUEUE_NAME=${VERIFY_QUEUE_NAME:-verification}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  backend-worker:
    build:
      context: ../..
      dockerfile: fakenews-backend/Dockerfile
    image: fakenews-backend:vps
    environment:
      - PORT=8000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO}
      - STRIPE_PRICE_ULTRA=${STRIPE_PRICE_ULTRA}
      - BILLING_SUCCESS_URL=${BILLING_SUCCESS_URL}
      - BILLING_CANCEL_URL=${BILLING_CANCEL_URL}
      - BILLING_PORTAL_RETURN_URL=${BILLING_PORTAL_RETURN_URL}
      - CORS_ALLOW_ORIGIN_REGEX=${CORS_ALLOW_ORIGIN_REGEX}
      - FEVER_MODEL_PATH=${FEVER_MODEL_PATH:-/models/fever/deberta-v3-small-fever-v1}
      - FEVER_AGENT_MAX_CLAIMS=${FEVER_AGENT_MAX_CLAIMS:-5}
      - FEVER_AGENT_MAX_EVIDENCES=${FEVER_AGENT_MAX_EVIDENCES:-5}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - FEVER_LLM_MODEL=${FEVER_LLM_MODEL:-gpt-4o-mini}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - VERIFY_REDIS_URL=${VERIFY_REDIS_URL:-redis://redis:6379/0}
      - VERIFY_QUEUE_NAME=${VERIFY_QUEUE_NAME:-verification}
    command: ["python", "worker.py"]
    healthcheck:
      disable: true
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: fakenews-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      backend-worker:
        condition: service_started
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config: