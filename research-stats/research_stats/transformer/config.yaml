model_name: microsoft/deberta-v3-small
max_length: 192
batch_size: 8
learning_rate: 2.0e-05
num_train_epochs: 1
weight_decay: 0.01
warmup_ratio: 0.06
gradient_accumulation_steps: 4
eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: true
metric_for_best_model: macro_f1
fp16: true
seed: 42
