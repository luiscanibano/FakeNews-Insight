# =====================================================================
# docker-compose.yml — Orquestación local de la app completa
# Uso:
#   1) Copia .env.example -> .env y rellena los valores
#   2) docker compose up --build
#   3) Frontend: http://localhost:5173   Backend: http://localhost:8000
# =====================================================================

services:
  backend:
    build:
      # Context = raíz del repo para que el Dockerfile pueda copiar ./models/
      context: .
      dockerfile: fakenews-backend/Dockerfile
    image: fakenews-backend:dev
    container_name: fakenews-backend
    environment:
      - PORT=8000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO}
      - STRIPE_PRICE_ULTRA=${STRIPE_PRICE_ULTRA}
      - BILLING_SUCCESS_URL=${BILLING_SUCCESS_URL:-http://localhost:5173/dashboard?billing=success&session_id={CHECKOUT_SESSION_ID}}
      - BILLING_CANCEL_URL=${BILLING_CANCEL_URL:-http://localhost:5173/dashboard?billing=cancel}
      - BILLING_PORTAL_RETURN_URL=${BILLING_PORTAL_RETURN_URL:-http://localhost:5173/dashboard}
      - FEVER_MODEL_PATH=${FEVER_MODEL_PATH:-/models/fever/deberta-v3-small-fever-v1}
      - FEVER_AGENT_MAX_CLAIMS=${FEVER_AGENT_MAX_CLAIMS:-5}
      - FEVER_AGENT_MAX_EVIDENCES=${FEVER_AGENT_MAX_EVIDENCES:-5}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - FEVER_LLM_MODEL=${FEVER_LLM_MODEL:-gpt-4o-mini}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./fakenews-frontend
      dockerfile: Dockerfile.dev
    image: fakenews-frontend:dev
    container_name: fakenews-frontend
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_ANALYSIS_API_BASE_URL=${VITE_ANALYSIS_API_BASE_URL:-http://localhost:8000}
      - VITE_ANALYSIS_TEXT_PATH=${VITE_ANALYSIS_TEXT_PATH:-/predecir/}
      - VITE_ANALYSIS_VERIFY_PATH=${VITE_ANALYSIS_VERIFY_PATH:-/verify}
      - VITE_ANALYSIS_SAVE_PATH=${VITE_ANALYSIS_SAVE_PATH:-/analyses/save}
      - VITE_ACCOUNT_DELETE_PATH=${VITE_ACCOUNT_DELETE_PATH:-/account/delete}
      - VITE_BILLING_CHECKOUT_PATH=${VITE_BILLING_CHECKOUT_PATH:-/billing/checkout}
      - VITE_BILLING_CONFIRM_PATH=${VITE_BILLING_CONFIRM_PATH:-/billing/confirm}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "5173:5173"
    volumes:
      - ./fakenews-frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  frontend_node_modules:
