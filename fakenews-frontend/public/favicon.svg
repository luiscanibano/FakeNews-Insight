<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="12" y1="10" x2="54" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07090E"/>
      <stop offset="1" stop-color="#121823"/>
    </linearGradient>

    <linearGradient id="glyph" x1="23" y1="18" x2="45" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C9D8FF"/>
      <stop offset="1" stop-color="#80A7FF"/>
    </linearGradient>

    <linearGradient id="rim" x1="10" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ADC7FF" stop-opacity="0.10"/>
      <stop offset="0.35" stop-color="#ADC7FF" stop-opacity="0.55"/>
      <stop offset="0.72" stop-color="#ADC7FF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ADC7FF" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="0" y="0" width="64" height="64" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="dotGlow" x="0" y="0" width="64" height="64" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="6" y="6" width="52" height="52" rx="14" fill="url(#bg)"/>
  <rect x="5.5" y="5.5" width="53" height="53" rx="14.5" stroke="url(#rim)" stroke-width="1"/>

  <g opacity="0.72">
    <path d="M18 20.5H46" stroke="#ADC7FF" stroke-opacity="0.12" stroke-width="1"/>
    <path d="M18 28.5H46" stroke="#ADC7FF" stroke-opacity="0.12" stroke-width="1"/>
    <path d="M18 36.5H46" stroke="#ADC7FF" stroke-opacity="0.12" stroke-width="1"/>
    <path d="M18 44.5H46" stroke="#ADC7FF" stroke-opacity="0.12" stroke-width="1"/>
    <path d="M20.5 18V46" stroke="#ADC7FF" stroke-opacity="0.12" stroke-width="1"/>
    <path d="M28.5 18V46" stroke="#ADC7FF" stroke-opacity="0.12" stroke-width="1"/>
    <path d="M36.5 18V46" stroke="#ADC7FF" stroke-opacity="0.12" stroke-width="1"/>
    <path d="M44.5 18V46" stroke="#ADC7FF" stroke-opacity="0.12" stroke-width="1"/>
  </g>

  <g filter="url(#glow)">
    <rect x="24" y="18" width="7" height="25" rx="3.5" fill="url(#glyph)"/>
    <rect x="27.5" y="31" width="20" height="6" rx="3" transform="rotate(-34 27.5 31)" fill="url(#glyph)"/>
  </g>

  <g filter="url(#dotGlow)">
    <circle cx="42" cy="22" r="4" fill="#EDF4FF"/>
  </g>
</svg>