name: Deploy backend to Render

# Triggerea el Deploy Hook de Render después de publicar la imagen Docker del
# backend. Render bajará la nueva imagen :latest desde GHCR.
on:
  workflow_run:
    workflows: ["Build & Publish backend Docker image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Render backend deploy hook
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Trigger backend deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::Falta el secret RENDER_DEPLOY_HOOK_BACKEND"
            exit 1
          fi
          curl -fsSL -X POST "$HOOK"
