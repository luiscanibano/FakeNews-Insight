name: CI

# Lint y smoke tests en cada PR y en pushes a ramas != main
on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  backend:
    name: Backend (lint + smoke tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fakenews-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: fakenews-backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Pre-download NLTK corpora
        run: |
          python -m nltk.downloader punkt punkt_tab stopwords wordnet omw-1.4

      - name: Run smoke tests
        env:
          # Valores dummy para que main.py no falle al arrancar
          SUPABASE_URL: "http://example.com"
          SUPABASE_ANON_KEY: "dummy"
          SUPABASE_SERVICE_ROLE_KEY: "dummy"
        run: pytest

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fakenews-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: fakenews-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (smoke)
        env:
          VITE_SUPABASE_URL: "http://example.com"
          VITE_SUPABASE_ANON_KEY: "dummy"
          VITE_ANALYSIS_API_BASE_URL: "http://example.com"
        run: npm run build
