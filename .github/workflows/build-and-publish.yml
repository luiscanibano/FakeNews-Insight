name: Build & Publish backend Docker image

# Construye y publica la imagen Docker del backend a GitHub Container Registry
# (GHCR) en cada push a main. El frontend se despliega como sitio estático en
# Cloudflare Pages desde su propio workflow.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}-backend

jobs:
  build-backend:
    name: Build & push backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify FEVER model artifacts
        run: |
          test -f models/fever/deberta-v3-small-fever-v1/model.onnx
          test -f models/fever/deberta-v3-small-fever-v1/config.json
          test -f models/fever/deberta-v3-small-fever-v1/tokenizer.json
          test -f models/fever/deberta-v3-small-fever-v1/tokenizer_config.json
          test -f models/fever/deberta-v3-small-fever-v1/special_tokens_map.json
          test -f models/fever/deberta-v3-small-fever-v1/spm.model

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: fakenews-backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
